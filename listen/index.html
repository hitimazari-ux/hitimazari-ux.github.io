<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Listen</title>

<style>
body {
  margin: 0;
  background: black;
  color: white;
  font-family: sans-serif;
  background-size: 320px 320px;
}

.content {
  padding: 40px;
  max-width: 900px;
}

.back-btn {
  display: inline-block;
  margin-bottom: 25px;
  padding: 10px 16px;
  color: white;
  text-decoration: none;
  letter-spacing: 2px;
  font-size: 12px;
  border: 1px solid rgba(255,255,255,0.25);
  border-radius: 8px;
  background: rgba(255,255,255,0.04);
}

.text {
  font-size: 16px;
  opacity: 0.85;
  margin-bottom: 30px;
}

.section {
  margin-bottom: 25px;
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 14px;
  background: rgba(255,255,255,0.03);
  overflow: hidden;
}

.section summary {
  padding: 18px 22px;
  cursor: pointer;
  letter-spacing: 2px;
}

.track {
  margin: 20px;
  padding: 20px;
  border: 1px solid rgba(255,255,255,0.10);
  border-radius: 14px;
}

.track-title {
  margin-bottom: 10px;
  letter-spacing: 2px;
}

audio {
  width: 100%;
  filter: invert(1);
}

.meta {
  margin-top: 10px;
  font-size: 12px;
  opacity: 0.8;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.stats {
  min-width: 100px;
}

.like-btn {
  background: rgba(255,255,255,0.08);
  color: white;
  border: 1px solid rgba(255,255,255,0.2);
  padding: 6px 10px;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.2s ease;
}

.like-btn:hover {
  background: rgba(255,255,255,0.15);
}

.like-btn.active {
  background: #ff0078;
  border-color: #ff0078;
  color: white;
  box-shadow: 0 0 12px rgba(255, 0, 120, 0.7);
}
</style>
</head>
<body>

<div class="content">
  <a href="/" class="back-btn">← НАЗАД</a>

  <h1>LISTEN</h1>

  <div class="text">И моя, и чужая музыка</div>

  <details class="section" open>

        <button class="like-btn" type="button">❤</button>
      </div>
    </div>

    <div class="track">

        <span class="stats">▶ 0 ❤ 0</span>
        <button class="like-btn" type="button">❤</button>
      </div>
    </div>

    <div class="track">
      <div class="track-title">The Rain</div>
      <audio controls data-slug="the_rain">
        <source src="music/TheRain.mp3" type="audio/mpeg">

      <div class="meta">
        <span class="stats">▶ 0 ❤ 0</span>
        <button class="like-btn" type="button">❤</button>
      </div>
    </div>

    <div class="track">
      <div class="track-title">Spring Jubilation</div>

        <span class="stats">▶ 0 ❤ 0</span>

      <div class="track-title">Autumn</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
// Проверяем, что библиотека загрузилась
if (!window.supabase) {
  console.error('Supabase library not loaded');
}

const supabase = window.supabase.createClient(
  'https://oqzuvzsrviqgjbznxbjh.supabase.co',
  'sb_publishable_GlIwN_M21PHS9tcp_spxfw_BKTTUAGP'
);

async function loadStats(slug, statsEl) {
  try {
    const { data, error } = await supabase
      .from('tracks')
      .select('plays, likes')
      .eq('slug', slug)
      .maybeSingle();

    if (error) {
      console.error('Load error:', slug, error);
      return;
    }

    if (data) {
      statsEl.textContent = `▶ ${data.plays ?? 0} ❤ ${data.likes ?? 0}`;
    }
  } catch (e) {
    console.error('Unexpected load error:', e);
  }
}

async function incrementPlay(slug) {
  try {
    await supabase.rpc('increment_plays', { track_slug: slug });
  } catch (e) {
    console.error('increment_plays error:', e);
  }
}

async function incrementLike(slug) {
  try {
    await supabase.rpc('increment_likes', { track_slug: slug });
  } catch (e) {
    console.error('increment_likes error:', e);
  }
}

// Инициализация всех треков
for (const track of document.querySelectorAll('.track')) {
  const audio = track.querySelector('audio');
  const slug = audio.dataset.slug;
  const stats = track.querySelector('.stats');
  const button = track.querySelector('.like-btn');

  let counted = false;

  // Восстановление состояния лайка
  if (localStorage.getItem('liked_' + slug) === '1') {
    button.classList.add('active');
  }

  // Загрузка статистики
  loadStats(slug, stats);

  // Клик по лайку
  button.addEventListener('click', async function () {
    // Если уже лайкали — ничего не делаем
    if (button.classList.contains('active')) {
      return;
    }

    // Делаем кнопку розовой СРАЗУ
    button.classList.add('active');

    // Запоминаем в браузере
    localStorage.setItem('liked_' + slug, '1');

    // Отправляем лайк в Supabase
    await incrementLike(slug);

    // Обновляем цифры
    await loadStats(slug, stats);
  });

  // Засчитываем прослушивание после 15 секунд
  audio.addEventListener('timeupdate', async function () {
    if (counted) return;
    if (audio.currentTime < 15) return;

    counted = true;

    await incrementPlay(slug);
    await loadStats(slug, stats);
  });
}
</script>

</body>
</html>
