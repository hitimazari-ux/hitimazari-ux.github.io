<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Read</title>

<style>
  body {
    margin: 0;
    color: white;
    font-family: serif;
    background: black;
    overflow-x: hidden;
  }

  /* ГРАВЮРНЫЙ ФОН */
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    z-index: -1;

    background-image:
      repeating-linear-gradient(
        0deg,
        rgba(255,255,255,0.04) 0px,
        rgba(255,255,255,0.04) 1px,
        transparent 1px,
        transparent 4px
      ),
      repeating-linear-gradient(
        90deg,
        rgba(255,255,255,0.03) 0px,
        rgba(255,255,255,0.03) 1px,
        transparent 1px,
        transparent 6px
      );

    opacity: 0.6;
  }

  .container {
    max-width: 800px;
    margin: 80px auto;
    padding: 20px;
    line-height: 1.6;
  }

  h1 {
    text-align: center;
    letter-spacing: 3px;
  }

  a {
    color: #aaa;
    text-decoration: none;
  }

  a:hover {
    color: white;
  }
</style>
</head>

<body>

<div class="container">
  <h1>READ</h1>

  <p>
    Тут будет текст. Можно вставить любой контент — он будет красиво
    лежать поверх “гравюрного” фона.
  </p>

  <p><a href="/">← назад</a></p>
</div>

</body>
</html>
