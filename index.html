<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Neon System</title>

<style>
  html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: #000;
    cursor: none;
    font-family: sans-serif;
  }

  canvas {
    display: block;
  }

  .hint {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    color: #888;
    font-size: 12px;
    letter-spacing: 1px;
  }
</style>
</head>
<body>

<canvas id="canvas"></canvas>
<div class="hint">двигай мышкой • кликай</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let w, h;
function resize() {
  w = canvas.width = window.innerWidth;
  h = canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

let mouse = { x: w/2, y: h/2, vx: 0, vy: 0 };

document.addEventListener("mousemove", e => {
  mouse.vx = e.clientX - mouse.x;
  mouse.vy = e.clientY - mouse.y;
  mouse.x = e.clientX;
  mouse.y = e.clientY;
});

document.addEventListener("click", () => {
  for (let i = 0; i < 40; i++) {
    particles.push(new Particle(mouse.x, mouse.y, true));
  }
});

class Particle {
  constructor(x, y, burst = false) {
    this.x = x;
    this.y = y;
    this.angle = Math.random() * Math.PI * 2;
    this.speed = burst ? Math.random()*6 : Math.random()*2;
    this.size = Math.random()*2 + 1;
    this.life = 1;
    this.hue = 180 + Math.random()*120;
  }

  update() {
    this.x += Math.cos(this.angle) * this.speed;
    this.y += Math.sin(this.angle) * this.speed;

    let dx = mouse.x - this.x;
    let dy = mouse.y - this.y;
    let dist = Math.sqrt(dx*dx + dy*dy);

    if (dist < 150) {
      this.x -= dx * 0.02;
      this.y -= dy * 0.02;
    }

    this.life -= 0.01;
  }

  draw() {
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI*2);
    ctx.fillStyle = `hsla(${this.hue}, 100%, 60%, ${this.life})`;
    ctx.shadowBlur = 20;
    ctx.shadowColor = `hsl(${this.hue}, 100%, 60%)`;
    ctx.fill();
  }
}

let particles = [];

for (let i = 0; i < 120; i++) {
  particles.push(new Particle(Math.random()*w, Math.random()*h));
}

function drawCore() {
  let speed = Math.sqrt(mouse.vx**2 + mouse.vy**2);

  let radius = 20 + speed * 0.5;
  let hue = 200 + speed * 5;

  ctx.beginPath();
  ctx.arc(mouse.x, mouse.y, radius, 0, Math.PI*2);

  ctx.fillStyle = `hsl(${hue}, 100%, 60%)`;
  ctx.shadowBlur = 50;
  ctx.shadowColor = `hsl(${hue}, 100%, 60%)`;
  ctx.fill();
}

function animate() {
  // чистый фон без мерцания
  ctx.globalCompositeOperation = "source-over";
  ctx.fillStyle = "#000";
  ctx.fillRect(0, 0, w, h);

  // режим неона
  ctx.globalCompositeOperation = "lighter";

  drawCore();

  particles.forEach((p, i) => {
    p.update();
    p.draw();
    if (p.life <= 0) particles.splice(i, 1);
  });

  if (particles.length < 150) {
    particles.push(new Particle(Math.random()*w, Math.random()*h));
  }

  requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
