<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Neon Cursor</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      background: #0a0a0a;
      overflow: hidden;
      cursor: none;
    }

    .circle {
      position: fixed;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      pointer-events: none;
      transform: translate(-50%, -50%);
      
      background: radial-gradient(circle, #00f7ff, #ff00c8);
      
      /* неоновое свечение */
      box-shadow:
        0 0 10px #00f7ff,
        0 0 20px #00f7ff,
        0 0 40px #ff00c8,
        0 0 80px #ff00c8;

      transition: width 0.2s, height 0.2s;
    }

    .circle.click {
      width: 80px;
      height: 80px;
    }
  </style>
</head>
<body>

<div class="circle" id="circle"></div>

<script>
  const circle = document.getElementById('circle');

  let mouseX = 0;
  let mouseY = 0;

  let currentX = 0;
  let currentY = 0;

  document.addEventListener('mousemove', (e) => {
    mouseX = e.clientX;
    mouseY = e.clientY;
  });

  document.addEventListener('mousedown', () => {
    circle.classList.add('click');
  });

  document.addEventListener('mouseup', () => {
    circle.classList.remove('click');
  });

  function animate() {
    currentX += (mouseX - currentX) * 0.15;
    currentY += (mouseY - currentY) * 0.15;

    circle.style.left = currentX + 'px';
    circle.style.top = currentY + 'px';

    requestAnimationFrame(animate);
  }

  animate();
</script>

</body>
</html>
