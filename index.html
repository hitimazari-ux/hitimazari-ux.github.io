<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Neon Cursor Speed</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      background: #0a0a0a;
      overflow: hidden;
      cursor: none;
    }

    .circle {
      position: fixed;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      pointer-events: none;
      transform: translate(-50%, -50%);
      
      background: radial-gradient(circle, #00f7ff, #ff00c8);

      box-shadow:
        0 0 10px #00f7ff,
        0 0 20px #00f7ff,
        0 0 40px #ff00c8,
        0 0 80px #ff00c8;

      transition: width 0.15s, height 0.15s;
    }

    .circle.click {
      width: 80px;
      height: 80px;
    }
  </style>
</head>
<body>

<div class="circle" id="circle"></div>

<script>
  const circle = document.getElementById('circle');

  let mouseX = 0;
  let mouseY = 0;
  let lastX = 0;
  let lastY = 0;

  let currentX = 0;
  let currentY = 0;

  let speed = 0;

  document.addEventListener('mousemove', (e) => {
    mouseX = e.clientX;
    mouseY = e.clientY;

    // вычисляем скорость
    const dx = mouseX - lastX;
    const dy = mouseY - lastY;
    speed = Math.sqrt(dx * dx + dy * dy);

    lastX = mouseX;
    lastY = mouseY;
  });

  document.addEventListener('mousedown', () => {
    circle.classList.add('click');
  });

  document.addEventListener('mouseup', () => {
    circle.classList.remove('click');
  });

  function animate() {
    currentX += (mouseX - currentX) * 0.15;
    currentY += (mouseY - currentY) * 0.15;

    // ограничим влияние скорости
    let scale = Math.min(speed / 20, 2);

    let size = 40 + scale * 20;

    circle.style.width = size + 'px';
    circle.style.height = size + 'px';

    // усиливаем свечение при скорости
    let glow = 10 + scale * 30;

    circle.style.boxShadow = `
      0 0 ${glow}px #00f7ff,
      0 0 ${glow * 2}px #00f7ff,
      0 0 ${glow * 3}px #ff00c8,
      0 0 ${glow * 4}px #ff00c8
    `;

    circle.style.left = currentX + 'px';
    circle.style.top = currentY + 'px';

    requestAnimationFrame(animate);
  }

  animate();
</script>

</body>
</html>
